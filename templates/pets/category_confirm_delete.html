{% extends 'dashboard/base_dashboard.html' %}

{% block page_title %}Delete Category{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm col-md-6 mx-auto">
    <div class="card-header bg-danger text-white py-3">
        <h5 class="mb-0">Confirm Deletion</h5>
    </div>
    <div class="card-body p-4 text-center">
        <div class="mb-4">
            <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
            <h4>Are you sure?</h4>
            <p class="text-muted">You are about to delete "<strong>{{ category.name }}</strong>".<br>This may affect
                existing pets linked to this category.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'pets:category_list' %}" class="btn btn-secondary px-4">Cancel</a>
                <button type="submit" class="btn btn-danger px-4">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
